    <title>Instagram</title>

<body>
    <header>
        <nav class="instagram_navbar">
            <div class="in_lg_container">
                <img src="image/instagram logo.png" alt="Facebook Logo" class="in_logo">
            </div>

            <div class="in_searchbar">
                <div class="search-wrapper">
                    <input type="text" class="search-input" placeholder=" ">
                
                    <div class="visual-placeholder">
                        <div class="placeholder_content">
                            <i class="fa-solid fa-magnifying-glass"></i>

                            <span>Search</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="in_icon">
                <button class="nav-icon-btn">
                    <i class="fa-regular fa-house"></i>
                </button>
                
                <button class="nav-icon-btn">
                    <i class="fa-regular fa-paper-plane">
                    <div class="notify">
                        5
                    </div>
                    </i>
                </button>
                
                <button class="nav-icon-btn">
                    <i class="fa-regular fa-compass"></i>
                </button>

                <button class="nav-icon-btn">
                    <i class="fa-regular fa-heart"></i> 
                </button>
                
                <div class="in_nav_circle"></div>
            </div>
        </nav>
    </header>

    <main>
        <section class="insta_profile">

                <div class="user_txt_cont">
                    <div class="user_detail">
                        <h2 class="username">naruto</h2>

                        <button class="btn-follow">Follow</button>

                        <button class="btn-icon-sm"><i class="fa-solid fa-sort-down"></i></button>
                        
                        <button class="btn-more">···</button>
                    </div>

                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-num">73</span>
                            <span class="stat-label">posts</span>
                        </div>
                        <div class="stat">
                            <span class="stat-num">378</span>
                            <span class="stat-label">followers</span>
                        </div>
                        <div class="stat">
                            <span class="stat-num">170</span>
                            <span class="stat-label">following</span>
                        </div>
                    </div>

                    <div class="user_txt">
                        <p class="ut1">name</p>

                        <p class="ut2">

                        </p>

                        <a href="http://"> bit.ly/35Ce3mX</a>

                </div>
            </div>

            <div class="sub_profile">
