<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-logo">Instagram</div>
    <div class="nav-search">
      <input type="text" placeholder="Search" />
    </div>
    <div class="nav-icons">
      <button class="nav-icon-btn">
        <!-- Home -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      </button>
      <button class="nav-icon-btn notif-wrap">
        <!-- Messenger -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="badge">4</span>
      </button>
      <button class="nav-icon-btn notif-wrap">
        <!-- New post -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
      </button>
      <button class="nav-icon-btn">
        <!-- Explore -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="nav-icon-btn">
        <!-- Heart / notifications -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <!-- Profile avatar -->
      <div class="nav-avatar"></div>
    </div>
  </nav>

  <!-- PROFILE SECTION -->
  <div class="profile-wrapper">

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-pic-wrap">
        <div class="profile-pic"></div>
      </div>

      <div class="profile-details">
        <div class="profile-top-row">
          <h2 class="username">name</h2>
          <button class="btn-follow">Follow</button>
          <button class="btn-icon-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </button>
          <button class="btn-more">···</button>
        </div>

        <div class="profile-stats">
          <div class="stat">
            <span class="stat-num">73</span>
            <span class="stat-label">posts</span>
          </div>
          <div class="stat">
            <span class="stat-num">378</span>
            <span class="stat-label">followers</span>
          </div>
          <div class="stat">
            <span class="stat-num">170</span>
            <span class="stat-label">following</span>
          </div>
        </div>

        <div class="profile-bio">
          <p class="bio-name">Name</p>
          <p class="bio-text">Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text.</p>
          <a href="#" class="bio-link">bit.ly/3AGa3mA</a>
        </div>
      </div>
    </div>

    <!-- Highlights -->
    <div class="highlights-row">
      <div class="highlight-item">
        <div class="highlight-circle"></div>
        <span class="highlight-label">Name</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-circle"></div>
        <span class="highlight-label">Name</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-circle"></div>
        <span class="highlight-label">Name</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <button class="tab-btn active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="0.5"/><rect x="14" y="3" width="7" height="7" rx="0.5"/><rect x="3" y="14" width="7" height="7" rx="0.5"/><rect x="14" y="14" width="7" height="7" rx="0.5"/></svg>
        Posts
      </button>
      <button class="tab-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>
        Tagged
      </button>
    </div>

    <!-- Posts Grid -->
    <div class="posts-grid">
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
      <div class="post-thumb dark-bg"></div>
    </div>

  </div>

</body>
</html>
