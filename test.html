<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="test.css">
</head>
<body>

    <input type="checkbox" id="chat-toggle" hidden>

    <!-- Chat Window -->
    <div class="chat-window">

        <div class="chat-header">
            <div class="profile-pic"></div>
            <span class="header-name">Name <span class="chevron">&#8964;</span></span>
            <div class="header-controls">
                <span class="minimize-btn">&#8212;</span>
                <label for="chat-toggle" class="close-btn">&#10005;</label>
            </div>
        </div>

        <div class="message-content">
            <p class="status-text">Typically replies within an hour</p>
            <p class="industry-label">Industry</p>
            <p class="welcome-msg">Hi Sally! Welcome to Name. Thanks for getting in touch with us on Messenger. Can we assist with lorem ipsum?</p>
            <p class="public-info">When you reply, Name will see your public info.</p>
            <button class="question-btn">Question A goes here</button>
            <button class="question-btn">Question B goes here</button>
            <button class="question-btn">Question C goes here</button>
        </div>

        <div class="input-bar">
            <!-- Plus -->
            <span class="bar-icon">
                <i class="fa-solid fa-circle-plus"></i>
            </span>
            <!-- Image -->
            <span class="bar-icon">
                <i class="fa-regular fa-image"></i>
            </span>
            <!-- Sticker -->
            <span class="bar-icon">
                <i class="fa-regular fa-note-sticky"></i>
            </span>
            <!-- GIF -->
            <span class="bar-icon gif-icon">GIF</span>
            <!-- Input -->
            <div class="input-field">Aa</div>
            <!-- Emoji -->
            <span class="bar-icon">
                <i class="fa-regular fa-face-smile"></i>
            </span>
            <!-- Menu -->
            <span class="bar-icon menu-icon">
                <i class="fa-solid fa-bars"></i>
            </span>
        </div>

    </div>

    <!-- Trigger button -->
    <label for="chat-toggle" class="chat-trigger">
        <span class="chat_box">
            <!-- Circular message icon (Facebook Messenger style) -->
        <i class="fa-solid fa-comment" id="bubble-icon">
            <!-- Plus sign -->
            <i class="fa-solid fa-plus"></i>
        </i>
        </span>
    </label>

</body>
</html>
