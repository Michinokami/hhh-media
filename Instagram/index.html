<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Instagram</title>

    <link rel="shortcut icon" href="image/Instagram_logo_2016.svg.png" type="image/x-icon">
    <link rel="stylesheet" href="style/general.css">
    <link rel="stylesheet" href="style/navbar.css ">
    <link rel="stylesheet" href="style/body.css ">

</head>

<body>
    <header>
        <nav class="instagram_navbar">
            <div class="in_lg_container">
                <img src="image/instagram logo.png" alt="Facebook Logo" class="in_logo">
            </div>

            <div class="in_searchbar">
                <div class="search-wrapper">
                    <input type="text" class="search-input" placeholder=" ">
                
                    <div class="visual-placeholder">
                        <div class="placeholder_content">
                            <i class="fa-solid fa-magnifying-glass"></i>

                            <span>Search</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="in_icon">
                <i class="fa-regular fa-house"></i>

                <i class="fa-regular fa-paper-plane">
                    <div class="notify">
                        5
                    </div>
                </i>

                <i class="fa-regular fa-compass"></i>

                <i class="fa-regular fa-heart"></i>

                <div class="in_nav_circle"></div>
            </div>
        </nav>
    </header>

    <main>
        <section class="insta_profile">
            <div class="user_profile">
                <div class="user_img_cont"></div>

                <div class="user_txt_cont">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>

            <div class="sub_profile">
                <div></div>

                <div></div>

                <div></div>
            </div>
        </section>

        <section class="insta_grid">
        </section>
    </main>
</body>
</html>
